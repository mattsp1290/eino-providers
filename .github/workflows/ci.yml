name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.25.x"
          - "1.26.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Test
        run: |
          packages="$(go list ./... 2>/dev/null || true)"
          if [ -n "$packages" ]; then
            go test $packages
          else
            echo "No Go packages yet."
          fi

      - name: Check non-Codex backend dependency graph
        run: scripts/check-dep-leaks.sh

      - name: Lint
        if: ${{ hashFiles('**/*.go') != '' }}
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
